name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: notein-linux
          - os: windows-latest
            artifact_name: notein-windows.exe
          - os: macos-latest
            artifact_name: notein-macos
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev libxcb-composite0-dev libxcb-xinput-dev libxcb-xkb-dev libasound2-dev

      - name: Build
        run: cargo build --release

      - name: Prepare binary (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          mv target/release/notein target/release/${{ matrix.artifact_name }}

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv target/release/notein.exe target/release/${{ matrix.artifact_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/${{ matrix.artifact_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
